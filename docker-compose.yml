services:
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - .:/workspace
    working_dir: /workspace

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    depends_on:
      - spark-master
    volumes:
      - .:/workspace
    working_dir: /workspace

  app:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-app
    environment:
      HF_HOME: /workspace/.cache/huggingface
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /workspace/src
    depends_on:
      - spark-master
      - spark-worker
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash"]

