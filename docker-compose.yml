services:
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - 0.0.0.0
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "18080:8080"
      - "7077:7077"
    volumes:
      - .:/workspace
    working_dir: /workspace

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 4G
      - --webui-port
      - "8081"
      - --work-dir
      - /tmp/spark-worker
    depends_on:
      - spark-master
    ports:
      - "18081:8081"
    volumes:
      - .:/workspace
    working_dir: /workspace

  app:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-app
    environment:
      HF_HOME: /workspace/.cache/huggingface
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /workspace/src
    depends_on:
      - spark-master
      - spark-worker
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash"]
