services:
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-spark-master
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
      USER: spark
      LOGNAME: spark
      SPARK_USER: spark
      HADOOP_USER_NAME: spark
      JAVA_TOOL_OPTIONS: -Duser.name=spark
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - 0.0.0.0
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "18080:8080"
      - "7077:7077"
    volumes:
      - .:/workspace
    working_dir: /workspace

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-spark-worker
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
      USER: spark
      LOGNAME: spark
      SPARK_USER: spark
      HADOOP_USER_NAME: spark
      JAVA_TOOL_OPTIONS: -Duser.name=spark
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 4G
      - --webui-port
      - "8081"
      - --work-dir
      - /tmp/spark-worker
    depends_on:
      - spark-master
    ports:
      - "18081:8081"
    volumes:
      - .:/workspace
    working_dir: /workspace

  app:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: robot-dataset-app
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HF_HOME: /workspace/.cache/huggingface
      HOME: /tmp
      USER: spark
      LOGNAME: spark
      SPARK_USER: spark
      HADOOP_USER_NAME: spark
      JAVA_TOOL_OPTIONS: -Duser.name=spark
      SPARK_MASTER_URL: spark://spark-master:7077
      PYTHONPATH: /workspace/src:/opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.9-src.zip
    depends_on:
      - spark-master
      - spark-worker
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["/bin/bash"]
