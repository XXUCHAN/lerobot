repo_id: yaak-ai/L2D-v3
target_dir: data/external/yaak-ai_L2D-v3_sample

# The downloader first fetches metadata, reads meta/episodes, then resolves the
# exact video shards referenced by the selected episodes.
metadata_patterns:
  - README.md
  - meta/**

# Frame parquet is much smaller than video and is needed by ingest/sync jobs.
base_patterns:
  - README.md
  - meta/**
  - data/**

# Approximate 50GiB working set. Current dry-run estimate for episodes 0..18 is
# about 48.47GiB with all camera views and frame parquet included.
max_download_gb: 50
episode_filter_start: 0
episode_limit: 19

include_all_camera_views: true
video_keys: []
